name: 'Reusable - Kubernetes Builder'

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Service name (e.g. monolith)'
      environment:
        required: true
        type: string
        description: 'Environment name (develop, staging, production, etc.)'
      path:
        required: true
        type: string
        description: 'Path to kustomize overlay (e.g. services/monolith/kubernetes/overlays/develop). Pass empty string to skip.'
      app-id:
        required: true
        type: string
        description: 'GitHub App ID for authentication'
    secrets:
      private-key:
        required: true
        description: 'GitHub App private key for authentication'

jobs:
  kubernetes-diff:
    name: 'Kubernetes Diff'
    if: inputs.path != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.private-key }}
          owner: ${{ github.repository_owner }}

      - name: Get PR information
        id: pr-info
        uses: jwalton/gh-find-current-pr@v1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          state: all
        continue-on-error: true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Kustomize Diff
        uses: panicboat/panicboat-actions/kustomize-diff@main
        with:
          token: ${{ steps.app-token.outputs.token }}
          service-name: ${{ inputs.service-name }}
          environment: ${{ inputs.environment }}
          path: ${{ inputs.path }}
          pr-number: ${{ steps.pr-info.outputs.number }}
